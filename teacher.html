<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Teacher Dashboard — Three Baby Birdies</title>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --red:#CC2929;--red-dark:#A81E1E;--red-light:#FDECEA;
  --sky:#6EB4D4;--sky-dark:#3A8BB0;--sky-light:#E8F4FA;
  --green:#4A8B3F;--green-light:#EDF7EC;
  --yellow:#F5C200;--yellow-light:#FFFAEB;
  --dark:#1A1A2E;--mid:#6B7280;--light:#9CA3AF;
  --cream:#FDF8F3;--cream-dark:#F0E8DE;--white:#fff;
  --font-display:'Quicksand',sans-serif;--font-body:'Nunito',sans-serif;
  --r-sm:8px;--r-md:12px;--r-lg:20px;--r-full:999px;
  --sh-sm:0 2px 8px rgba(0,0,0,.06);--sh-md:0 4px 20px rgba(0,0,0,.08);
}
body{font-family:var(--font-body);background:var(--cream);color:var(--dark);min-height:100vh;}
.admin-header{background:linear-gradient(135deg,var(--green),#3A7030);padding:0 24px;height:60px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:100;}
.header-logo{display:flex;align-items:center;gap:8px;font-family:var(--font-display);font-weight:700;font-size:1rem;color:#fff;}
.header-badge{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);color:#fff;font-family:var(--font-display);font-weight:700;font-size:.72rem;padding:4px 12px;border-radius:var(--r-full);}
.header-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
.header-email{font-size:.78rem;color:rgba(255,255,255,.8);font-family:var(--font-display);}
.btn-logout{padding:7px 16px;border-radius:var(--r-full);border:1.5px solid rgba(255,255,255,.4);background:none;color:#fff;font-family:var(--font-display);font-weight:700;font-size:.78rem;cursor:pointer;}
.btn-logout:hover{background:rgba(255,255,255,.15);}
.admin-body{max-width:1000px;margin:0 auto;padding:26px 16px 60px;}
.row{display:flex;align-items:center;gap:12px;margin-bottom:18px;flex-wrap:wrap;}
.row .grow{margin-right:auto;}
h2.page{font-family:var(--font-display);font-weight:700;font-size:1.15rem;color:var(--dark);margin:0;}
.section-title{font-family:var(--font-display);font-weight:700;font-size:.78rem;color:var(--red);text-transform:uppercase;letter-spacing:.06em;margin:22px 0 10px;}
.btn{border:none;border-radius:var(--r-full);padding:9px 16px;font-family:var(--font-display);font-weight:700;font-size:.82rem;cursor:pointer;display:inline-flex;align-items:center;gap:6px;}
.btn-green{background:var(--green);color:#fff;}
.btn-red{background:var(--red);color:#fff;}
.btn-amber{background:var(--yellow);color:#5a4600;}
.btn-ghost{background:var(--white);color:var(--dark);border:1.5px solid var(--cream-dark);}
.btn-sky{background:var(--sky);color:#fff;padding:6px 12px;font-size:.75rem;}
.btn-mini{background:none;color:var(--mid);padding:6px 8px;font-size:.75rem;}
/* class cards */
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;}
.class-card{background:#fff;border-radius:var(--r-lg);padding:18px;box-shadow:var(--sh-sm);cursor:pointer;border-top:3px solid var(--sky);transition:transform .15s;}
.class-card:hover{transform:translateY(-2px);box-shadow:var(--sh-md);}
.class-card .emoji{font-size:1.6rem;}
.class-card .name{font-family:var(--font-display);font-weight:700;font-size:1rem;margin-top:6px;}
.class-card .meta{font-size:.78rem;color:var(--mid);font-weight:600;margin-top:2px;}
.empty{text-align:center;padding:48px 20px;color:var(--mid);}
.empty .big{font-size:2.6rem;}
/* stats */
.stats{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:8px;}
.stat{flex:1;min-width:120px;background:#fff;border-radius:var(--r-md);padding:14px 16px;box-shadow:var(--sh-sm);border-left:4px solid var(--sky);}
.stat .v{font-family:var(--font-display);font-weight:700;font-size:1.5rem;}
.stat .l{font-size:.68rem;color:var(--mid);font-weight:700;text-transform:uppercase;letter-spacing:.04em;}
/* table */
.table-wrap{background:#fff;border-radius:var(--r-lg);box-shadow:var(--sh-sm);overflow:auto;}
table{width:100%;border-collapse:collapse;min-width:560px;}
thead{background:var(--cream);}
th{padding:10px 14px;font-family:var(--font-display);font-weight:700;font-size:.72rem;color:var(--mid);text-align:left;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--cream-dark);}
td{padding:11px 14px;font-size:.85rem;border-bottom:1px solid var(--cream-dark);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
/* progress bars */
.bar-row{margin-bottom:10px;}
.bar-top{display:flex;font-size:.82rem;font-weight:700;margin-bottom:4px;}
.bar-top .subj{text-transform:capitalize;margin-right:auto;}
.bar{height:8px;background:#ededed;border-radius:5px;overflow:hidden;}
.bar > i{display:block;height:100%;background:var(--sky);border-radius:5px;}
/* lessons */
.lesson{display:flex;align-items:center;gap:10px;border:1px solid var(--cream-dark);border-radius:var(--r-md);padding:11px 14px;margin-bottom:8px;}
.lesson .grow{margin-right:auto;}
.lesson .t{font-family:var(--font-display);font-weight:700;font-size:.9rem;}
.lesson .d{font-size:.75rem;color:var(--mid);}
/* modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;z-index:200;padding:20px;}
.overlay.open{display:flex;}
.modal{background:#fff;border-radius:var(--r-lg);padding:24px;width:100%;max-width:440px;box-shadow:var(--sh-md);}
.modal.wide{max-width:640px;max-height:86vh;overflow:auto;}
.modal h3{font-family:var(--font-display);font-weight:700;margin-bottom:16px;}
.field{margin-bottom:14px;}
.field label{display:block;font-family:var(--font-display);font-weight:700;font-size:.72rem;color:#555;text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px;}
.field input,.field select{width:100%;padding:10px 14px;border:1.5px solid var(--cream-dark);border-radius:var(--r-md);font-family:var(--font-body);font-size:.9rem;background:var(--cream);outline:none;}
.field input:focus,.field select:focus{border-color:var(--sky);}
.modal-actions{display:flex;gap:10px;margin-top:6px;}
.modal-actions .btn{flex:1;justify-content:center;}
/* plan viewer */
.plan h4{font-family:var(--font-display);color:var(--red);margin:0 0 6px;}
.plan .ov{color:#555;font-size:.9rem;margin-bottom:12px;line-height:1.6;}
.plan .day{border:1px solid var(--cream-dark);border-radius:var(--r-md);margin-bottom:8px;overflow:hidden;}
.plan .day-h{background:var(--sky-light);padding:9px 14px;font-family:var(--font-display);font-weight:700;font-size:.85rem;color:var(--sky-dark);}
.plan .day-b{padding:12px 14px;font-size:.85rem;color:#444;line-height:1.6;}
.plan .day-b p{margin-bottom:6px;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:12px 24px;border-radius:var(--r-full);font-family:var(--font-display);font-weight:700;font-size:.85rem;color:#fff;z-index:500;opacity:0;transition:opacity .3s;pointer-events:none;}
.toast.success{background:var(--green);}.toast.error{background:var(--red);}.toast.show{opacity:1;}
.loading-bar{text-align:center;padding:36px;color:var(--mid);font-family:var(--font-display);font-weight:600;}
@media(max-width:600px){th{font-size:.66rem;}td{font-size:.78rem;}}
</style>
</head>
<body>

<header class="admin-header">
  <div class="header-logo">🐦 Three Baby Birdies</div>
  <div class="header-badge">🎓 Teacher Dashboard</div>
  <div class="header-right">
    <span class="header-email" id="t-email">—</span>
    <button class="btn-logout" onclick="logout()">Log out</button>
  </div>
</header>

<div class="admin-body">
  <!-- LIST VIEW -->
  <div id="view-list">
    <div class="row">
      <h2 class="page grow">Your Classes</h2>
      <button class="btn btn-green" onclick="openModal('m-class')">＋ New Class</button>
    </div>
    <div id="class-list"><div class="loading-bar">Loading classes…</div></div>
  </div>

  <!-- DETAIL VIEW -->
  <div id="view-detail" style="display:none;">
    <div class="row">
      <button class="btn btn-ghost" onclick="showList()">← Classes</button>
      <h2 class="page grow" id="d-name">Class</h2>
      <button class="btn btn-ghost" onclick="downloadReport()">⬇ Class Report</button>
      <button class="btn btn-ghost" style="color:var(--red);border-color:#fca5a5;" onclick="deleteClass()">Delete</button>
    </div>

    <div class="stats" id="d-stats"></div>

    <div class="row" style="margin-top:22px;margin-bottom:10px;">
      <div class="section-title grow" style="margin:0;">Roster</div>
      <button class="btn btn-green" onclick="openModal('m-student')">＋ Add Student</button>
    </div>
    <div class="table-wrap" id="d-roster"></div>

    <div class="section-title">Class Progress by Subject</div>
    <div id="d-subjects"></div>

    <div class="row" style="margin-top:22px;margin-bottom:10px;">
      <div class="section-title grow" style="margin:0;">Assigned Lessons</div>
      <button class="btn btn-amber" onclick="openModal('m-lesson')">📖 Assign Lesson</button>
    </div>
    <div id="d-lessons"></div>
  </div>
</div>

<!-- New Class modal -->
<div class="overlay" id="m-class"><div class="modal">
  <h3>🏫 New Class</h3>
  <div class="field"><label>Class name</label><input id="nc-name" placeholder="e.g. Grade 1 - Room A"></div>
  <div class="field"><label>Grade level (optional)</label><input id="nc-grade" placeholder="Grade 1"></div>
  <div class="modal-actions">
    <button class="btn btn-ghost" onclick="closeModal('m-class')">Cancel</button>
    <button class="btn btn-red" onclick="createClass()">Create</button>
  </div>
</div></div>

<!-- Add Student modal -->
<div class="overlay" id="m-student"><div class="modal">
  <h3>🐣 Add Student</h3>
  <div class="field"><label>Nickname</label><input id="ns-name" placeholder="e.g. Emma"></div>
  <div style="display:flex;gap:10px;">
    <div class="field" style="flex:1;"><label>Age</label><input id="ns-age" inputmode="numeric" placeholder="6"></div>
    <div class="field" style="flex:1;"><label>Grade</label><input id="ns-grade" placeholder="Grade 1"></div>
  </div>
  <div class="modal-actions">
    <button class="btn btn-ghost" onclick="closeModal('m-student')">Cancel</button>
    <button class="btn btn-green" onclick="addStudent()">Add</button>
  </div>
</div></div>

<!-- Assign Lesson modal -->
<div class="overlay" id="m-lesson"><div class="modal">
  <h3>📖 Assign Lesson to Class</h3>
  <div class="field"><label>Subject</label>
    <select id="al-subject">
      <option>spelling</option><option>math</option><option>rhyming</option>
      <option>grammar</option><option>puzzles</option><option>literature</option>
    </select>
  </div>
  <div style="display:flex;gap:10px;">
    <div class="field" style="flex:1;"><label>Grade</label><input id="al-grade" placeholder="Grade 1"></div>
    <div class="field" style="flex:1;"><label>Duration</label>
      <select id="al-duration"><option>3 days</option><option selected>5 days</option><option>1 week</option><option>2 weeks</option></select>
    </div>
  </div>
  <div class="field"><label>Focus areas (optional)</label><input id="al-focus" placeholder="e.g. sight words"></div>
  <div class="modal-actions">
    <button class="btn btn-ghost" onclick="closeModal('m-lesson')">Cancel</button>
    <button class="btn btn-red" id="al-go" onclick="assignLesson()">Generate &amp; Assign</button>
  </div>
</div></div>

<!-- View Plan modal -->
<div class="overlay" id="m-plan"><div class="modal wide">
  <div style="display:flex;justify-content:flex-end;margin-bottom:8px;">
    <button class="btn btn-ghost" onclick="closeModal('m-plan')">✕ Close</button>
  </div>
  <div class="plan" id="plan-body"></div>
</div></div>

<div class="toast" id="toast"></div>

<script>
const API = 'https://web-production-bcff5.up.railway.app';
const token = localStorage.getItem('mb_token');
const user  = JSON.parse(localStorage.getItem('mb_user') || 'null');

// Auth guard — valid, unexpired token + teacher role
function tokenValid(t){ try{ const p=t.split('.')[1].replace(/-/g,'+').replace(/_/g,'/');const pad=p.length%4?'='.repeat(4-(p.length%4)):'';return JSON.parse(atob(p+pad)).exp*1000>Date.now(); }catch(e){ return false; } }
if (!token || !user || !tokenValid(token)) { ['mb_token','mb_user','mb_child_id'].forEach(k=>localStorage.removeItem(k)); window.location.href='login.html'; }
if (user && user.role !== 'teacher') { window.location.href = user.role === 'admin' ? 'admin.html' : 'app.html'; }
document.getElementById('t-email').textContent = user?.email || '';

let classes = [];
let active  = null;   // { id, name, grade_level }
let lessons = [];

function api(method, path, body, raw){
  const opts = { method, headers: { 'Content-Type':'application/json', 'Authorization':'Bearer '+token } };
  if (body) opts.body = JSON.stringify(body);
  return fetch(API + path, opts).then(r => raw ? r : r.json().then(j => ({ ok:r.ok, status:r.status, data:j })));
}
const esc = s => String(s==null?'':s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const accColor = a => a>=80?'var(--green)':a>=50?'#B8860B':'var(--red)';

// ── LIST ────────────────────────────────────────────────────────────
async function loadClasses(){
  try{
    const r = await api('GET','/classrooms');
    if(!r.ok) throw 0;
    classes = r.data.classrooms || [];
    renderClasses();
  }catch(e){ document.getElementById('class-list').innerHTML='<div class="loading-bar">Could not load classes.</div>'; }
}
function renderClasses(){
  const el = document.getElementById('class-list');
  if(!classes.length){ el.innerHTML='<div class="empty"><div class="big">🏫</div><p style="font-weight:700;margin-top:8px;">No classes yet</p><p style="font-size:.85rem;">Create your first class to add students and track progress.</p></div>'; return; }
  el.innerHTML = '<div class="cards">'+classes.map(c=>`
    <div class="class-card" onclick='openClass(${JSON.stringify(c).replace(/'/g,"&#39;")})'>
      <div class="emoji">📚</div>
      <div class="name">${esc(c.name)}</div>
      <div class="meta">${c.grade_level?esc(c.grade_level)+' · ':''}${c.student_count} student${c.student_count===1?'':'s'}</div>
    </div>`).join('')+'</div>';
}
function showList(){ document.getElementById('view-detail').style.display='none'; document.getElementById('view-list').style.display='block'; loadClasses(); }

// ── DETAIL ──────────────────────────────────────────────────────────
async function openClass(c){
  active = c;
  document.getElementById('view-list').style.display='none';
  document.getElementById('view-detail').style.display='block';
  document.getElementById('d-name').textContent = c.name + (c.grade_level? ' · '+c.grade_level : '');
  document.getElementById('d-stats').innerHTML='<div class="loading-bar" style="width:100%;">Loading class data…</div>';
  document.getElementById('d-roster').innerHTML=''; document.getElementById('d-subjects').innerHTML=''; document.getElementById('d-lessons').innerHTML='';
  try{
    const [a, l] = await Promise.all([ api('GET',`/classrooms/${c.id}/analytics`), api('GET',`/classrooms/${c.id}/lessons`) ]);
    lessons = (l.data && l.data.lesson_plans) || [];
    renderDetail(a.data);
  }catch(e){ document.getElementById('d-stats').innerHTML='<div class="loading-bar">Could not load class data.</div>'; }
}
function refreshDetail(){ if(active) openClass(active); }

function renderDetail(a){
  const t = a.totals||{}, students=a.students||[], subs=a.subject_breakdown||{};
  document.getElementById('d-stats').innerHTML = `
    <div class="stat" style="border-left-color:var(--sky)"><div class="v">${t.students||0}</div><div class="l">Students</div></div>
    <div class="stat" style="border-left-color:var(--green)"><div class="v" style="color:var(--green)">${t.accuracy_pct||0}%</div><div class="l">Class Accuracy</div></div>
    <div class="stat" style="border-left-color:var(--red)"><div class="v" style="color:var(--red)">${t.sessions||0}</div><div class="l">Sessions</div></div>
    <div class="stat" style="border-left-color:var(--yellow)"><div class="v" style="color:#B8860B">${t.badges||0}</div><div class="l">Badges</div></div>`;

  // roster
  let rows = students.length ? students.map(s=>`
    <tr>
      <td><strong>🐣 ${esc(s.child_name)}</strong></td>
      <td>${esc(s.grade)||'—'}</td>
      <td>${s.sessions}</td>
      <td style="font-weight:700;color:${accColor(s.avg_score)}">${s.avg_score}%</td>
      <td>${s.badges}</td>
      <td style="white-space:nowrap;">
        <button class="btn btn-sky" onclick="teach('${s.id}')">▶ Teach</button>
        <button class="btn btn-mini" onclick="removeStudent('${s.id}','${esc(s.child_name)}')">Remove</button>
      </td>
    </tr>`).join('') : '<tr><td colspan="6" style="color:var(--mid);">No students yet — add one to get started.</td></tr>';
  document.getElementById('d-roster').innerHTML = `<table><thead><tr>
    <th>Student</th><th>Grade</th><th>Sessions</th><th>Accuracy</th><th>Badges</th><th></th></tr></thead><tbody>${rows}</tbody></table>`;

  // subjects
  const subEl = document.getElementById('d-subjects');
  const keys = Object.keys(subs).sort();
  subEl.innerHTML = keys.length ? keys.map(k=>{
    const v=subs[k];
    return `<div class="bar-row"><div class="bar-top"><span class="subj">${esc(k)}</span><span style="color:${accColor(v.accuracy_pct)}">${v.accuracy_pct}% · ${v.correct}/${v.total}</span></div><div class="bar"><i style="width:${Math.min(v.accuracy_pct,100)}%"></i></div></div>`;
  }).join('') : '<p style="color:var(--mid);font-size:.85rem;">No subject data recorded yet.</p>';

  // lessons
  const lEl = document.getElementById('d-lessons');
  lEl.innerHTML = lessons.length ? lessons.map((l,i)=>`
    <div class="lesson"><div class="grow"><div class="t">${esc(l.title)}</div><div class="d">${String(l.created_at||'').slice(0,10)}</div></div>
    <button class="btn btn-ghost" onclick="viewPlan(${i})">View</button></div>`).join('')
    : '<p style="color:var(--mid);font-size:.85rem;">No lessons assigned yet.</p>';
}

// ── Actions ─────────────────────────────────────────────────────────
async function createClass(){
  const name=document.getElementById('nc-name').value.trim();
  if(!name){ showToast('Enter a class name','error'); return; }
  const r=await api('POST','/classrooms',{name,grade_level:document.getElementById('nc-grade').value.trim()||null});
  if(r.ok){ closeModal('m-class'); document.getElementById('nc-name').value=''; document.getElementById('nc-grade').value=''; showToast('Class created','success'); loadClasses(); }
  else showToast(errMsg(r),'error');
}
async function deleteClass(){
  if(!confirm(`Delete class "${active.name}"? Students stay in your account but are unassigned.`)) return;
  const r=await api('DELETE',`/classrooms/${active.id}`);
  if(r.ok){ showToast('Class deleted','success'); showList(); } else showToast(errMsg(r),'error');
}
async function addStudent(){
  const nm=document.getElementById('ns-name').value.trim();
  if(!nm){ showToast('Enter a nickname','error'); return; }
  const age=document.getElementById('ns-age').value.replace(/\D/g,'');
  const r=await api('POST',`/classrooms/${active.id}/students`,{child_name:nm,age:age?Number(age):null,grade:document.getElementById('ns-grade').value.trim()||null});
  if(r.ok){ closeModal('m-student'); ['ns-name','ns-age','ns-grade'].forEach(id=>document.getElementById(id).value=''); showToast('Student added','success'); refreshDetail(); }
  else showToast(errMsg(r),'error');
}
async function removeStudent(sid,name){
  if(!confirm(`Remove ${name} from this class?`)) return;
  const r=await api('DELETE',`/classrooms/${active.id}/students/${sid}`);
  if(r.ok){ showToast('Student removed','success'); refreshDetail(); } else showToast(errMsg(r),'error');
}
async function assignLesson(){
  const btn=document.getElementById('al-go'); btn.disabled=true; btn.textContent='Generating…';
  const body={ subject:document.getElementById('al-subject').value, grade:document.getElementById('al-grade').value.trim()||'1',
    duration:document.getElementById('al-duration').value, focus_areas:document.getElementById('al-focus').value.trim() };
  const r=await api('POST',`/classrooms/${active.id}/assign-lesson`,body);
  btn.disabled=false; btn.textContent='Generate & Assign';
  if(r.ok){ closeModal('m-lesson'); showToast('Lesson assigned','success'); refreshDetail(); } else showToast(errMsg(r),'error');
}
function viewPlan(i){ const p=lessons[i]&&lessons[i].plan_data; document.getElementById('plan-body').innerHTML=renderPlan(p); openModal('m-plan'); }
function teach(sid){ localStorage.setItem('mb_child_id', sid); window.location.href='app.html'; }

async function downloadReport(){
  try{
    const res = await api('GET',`/classrooms/${active.id}/report-pdf`,null,true);
    if(!res.ok) throw 0;
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const a=document.createElement('a'); a.href=url; a.download=`class_report_${(active.name||'class').replace(/\s+/g,'_')}.pdf`;
    document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
  }catch(e){ showToast('Could not generate report','error'); }
}

function renderPlan(p){
  if(!p) return '<p>No plan data.</p>';
  if(p.raw_content) return `<h4>Lesson Plan</h4><pre style="white-space:pre-wrap;font-size:.85rem;color:#444;line-height:1.6;">${esc(p.raw_content)}</pre>`;
  let h=`<h4>${esc(p.title||'Lesson Plan')}</h4>`;
  if(p.overview) h+=`<p class="ov">${esc(p.overview)}</p>`;
  if(Array.isArray(p.objectives)&&p.objectives.length) h+=`<div style="margin-bottom:12px;"><strong style="color:var(--green);font-size:.75rem;text-transform:uppercase;">Objectives</strong><ul style="margin:6px 0 0 18px;font-size:.85rem;color:#444;line-height:1.6;">${p.objectives.map(o=>`<li>${esc(o)}</li>`).join('')}</ul></div>`;
  (p.days||[]).forEach((d,i)=>{
    h+=`<div class="day"><div class="day-h">Day ${d.day||i+1}${d.title?' — '+esc(d.title):''}</div><div class="day-b">
      ${d.objective?`<p><strong style="color:var(--green)">Objective:</strong> ${esc(d.objective)}</p>`:''}
      ${d.warmup?`<p><strong style="color:var(--sky-dark)">Warm-up:</strong> ${esc(d.warmup)}</p>`:''}
      ${d.main_activity?`<p><strong style="color:var(--red)">Main Activity:</strong> ${esc(d.main_activity)}</p>`:''}
      ${d.practice?`<p><strong>Practice:</strong> ${esc(d.practice)}</p>`:''}
      ${d.assessment?`<p><strong>Assessment:</strong> ${esc(d.assessment)}</p>`:''}
      ${d.homework?`<p><strong>Homework:</strong> ${esc(d.homework)}</p>`:''}
    </div></div>`;
  });
  const tips=Array.isArray(p.parent_tips)?p.parent_tips.join(' · '):p.parent_tips;
  if(tips) h+=`<div style="margin-top:12px;background:var(--yellow-light);border-radius:10px;padding:12px 14px;"><strong style="color:#B8860B;font-size:.75rem;text-transform:uppercase;">Teacher Tips</strong><p style="margin-top:6px;font-size:.85rem;color:#555;line-height:1.6;">${esc(tips)}</p></div>`;
  return h;
}

// ── utils ───────────────────────────────────────────────────────────
function errMsg(r){ const d=r.data&&r.data.detail; return (d&&d.message)||d||'Something went wrong'; }
function openModal(id){ document.getElementById(id).classList.add('open'); }
function closeModal(id){ document.getElementById(id).classList.remove('open'); }
function logout(){ ['mb_token','mb_user','mb_child_id'].forEach(k=>localStorage.removeItem(k)); window.location.href='login.html'; }
function showToast(msg,type){ const t=document.getElementById('toast'); t.textContent=msg; t.className='toast '+type+' show'; setTimeout(()=>t.className='toast '+type,3000); }
document.querySelectorAll('.overlay').forEach(o=>o.addEventListener('click',e=>{ if(e.target===o) o.classList.remove('open'); }));

loadClasses();
</script>
</body>
</html>
